kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: 'kubevirt.io:dm'
rules:
  - verbs:
      - get
      - delete
      - create
      - update
      - patch
      - list
      - watch
      - deletecollection
    apiGroups:
      - subresources.kubevirt.io
    resources:
      - virtualmachines/migrate
      - virtualmachines/pause
      - virtualmachines/unpause
      - virtualmachines/freeze
      - virtualmachines/unfreeze
      - virtualmachines/softreboot
      - virtualmachines/reset
  - verbs:
      - get
      - delete
      - create
      - update
      - patch
      - list
      - watch
      - deletecollection
    apiGroups:
      - kubevirt.io
    resources:
      - virtualmachineinstancemigrations