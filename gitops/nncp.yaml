apiVersion: nmstate.io/v1
kind: NodeNetworkConfigurationPolicy
metadata:
  name: br-flat
spec:
  desiredState:
    interfaces:
      - bridge:
          options:
            stp:
              enabled: false
          port:
            - name: enp1s0 
        description: Linux bridge with enp1s0 as a port
        ipv4:
          dhcp: false
          enabled: false
        name: br-flat 
        state: up
        type: linux-bridge
  nodeSelector:
    node-role.kubernetes.io/worker: ''